---
name: Test

on:
  workflow_call:
    inputs:
      badges-gist-id:
        required: false
        type: string
        description: gist id for badges publishing
        default: ${{ vars.BADGES_GIST_ID }}

jobs:
  publish-test-results:
    name: Test results publishing
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
    if: always()
    env:
      publish-to-coveralls: ${{ secrets.COVERALLS_REPO_TOKEN != '' }}

    steps:

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: test-results--*
          path: test/results/
          merge-multiple: false

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: coverage
          path: coverage/
          merge-multiple: true

      - name: Publish tests results
        uses: EnricoMi/publish-unit-test-result-action@v2
        id: test-results
        if: (!cancelled())
        with:
          files: test/results/*/junit-report.xml

      - uses: gaelgirodon/ci-badges-action@v1
        with:
          gist-id: ${{ inputs.badges-gist-id }}
          token: ${{ secrets.GIST_TOKEN }}

      - uses: coverallsapp/github-action@v2
        if: env.publish-to-coveralls == 'true'
        continue-on-error: true
