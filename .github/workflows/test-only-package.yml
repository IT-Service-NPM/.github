---
name: Test

on:
  workflow_call:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'macos-latest', 'windows-latest']
        node-version: ['22.x', '23.x', '24.x', 'latest']
        include:
          - os: 'ubuntu-latest'
            node-version: 'latest'
            main-test-environment: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: IT-Service-NPM/.github/.github/actions/setup@main

      - uses: IT-Service-NPM/.github/.github/actions/download-package-dist@main

      - name: Test
        run: pnpm run --if-present test

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results--${{ matrix.os }}--${{ matrix.node-version }}
          path: test/results/junit-report.xml

      - name: Upload Test Coverage
        if: matrix.main-test-environment
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
